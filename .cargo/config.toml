# Serialize test execution. `SCRIPT_ENGINE` is a single shared `mlua::Lua`
# state (plus a shared `module_cache`). Parallel tests sharing that single
# state hang under contention — empirically not a clean two-thread deadlock,
# but reproducible whenever 4+ scripted tests run on multiple threads.
# Single-threaded execution sidesteps the issue entirely.
#
# Long-term fix: thread-local Lua state (each test thread gets its own
# engine). See the comment in `core/src/scripts/script_engine.rs` for context.
#
# Override with `RUST_TEST_THREADS=N cargo test` if you have a reason
# (e.g. measuring serial overhead).
[env]
RUST_TEST_THREADS = "1"
